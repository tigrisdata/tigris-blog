<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 250"
  width="720"
  height="250"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 16px;
      fill: #62feb5;
      font-weight: 600;
    }
    .sub {
      font-size: 12px;
      fill: #94a3b8;
    }
    .label {
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .edge {
      font-size: 11px;
      fill: #fbbf24;
      font-weight: 600;
    }
    .small {
      font-size: 11px;
      fill: #bac1be;
    }
    .box {
      rx: 6;
      ry: 6;
      fill: #1a2e35;
      stroke: #2a3731;
      stroke-width: 1;
    }
    .arrow {
      stroke: #94a3b8;
      stroke-width: 1.5;
      fill: none;
    }
  </style>

  <defs>
    <marker
      id="arrowhead"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto"
    >
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" class="title">
    Where the bad write enters
  </text>
  <text x="360" y="45" text-anchor="middle" class="sub">
    every entry vector lands in the storage bucket with no reviewer between
  </text>

  <!-- Vector labels (right-aligned to x=145) -->
  <text x="145" y="94" text-anchor="end" class="label">wiki sync</text>
  <text x="145" y="134" text-anchor="end" class="label">nightly import</text>
  <text x="145" y="174" text-anchor="end" class="label">insider commit</text>
  <text x="145" y="214" text-anchor="end" class="label">customer PDF</text>

  <!-- Horizontal lines from each label to convergence -->
  <line x1="155" y1="90" x2="200" y2="90" class="arrow" />
  <line x1="155" y1="130" x2="200" y2="130" class="arrow" />
  <line x1="155" y1="170" x2="200" y2="170" class="arrow" />
  <line x1="155" y1="210" x2="200" y2="210" class="arrow" />

  <!-- Vertical convergence bar -->
  <line x1="200" y1="90" x2="200" y2="210" class="arrow" />

  <!-- Merged line to corpus -->
  <line
    x1="200"
    y1="150"
    x2="290"
    y2="150"
    class="arrow"
    marker-end="url(#arrowhead)"
  />

  <!-- Storage bucket -->
  <rect x="290" y="125" width="160" height="50" class="box" />
  <text x="370" y="155" text-anchor="middle" class="label">storage bucket</text>

  <!-- Arrow corpus -> agent with "no reviewer here" annotation -->
  <text x="500" y="140" text-anchor="middle" class="edge">
    no reviewer here
  </text>
  <line
    x1="450"
    y1="150"
    x2="555"
    y2="150"
    class="arrow"
    marker-end="url(#arrowhead)"
  />

  <!-- Agent retrieval -->
  <rect x="555" y="125" width="150" height="50" class="box" />
  <text x="630" y="155" text-anchor="middle" class="label">agent retrieval</text>
</svg>
