<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 230"
  width="720"
  height="230"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 16px;
      fill: #62feb5;
      font-weight: 600;
    }
    .sub {
      font-size: 12px;
      fill: #94a3b8;
    }
    .label {
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .small {
      font-size: 11px;
      fill: #bac1be;
    }
    .check {
      font-size: 18px;
      fill: #62feb5;
      font-weight: 700;
    }
    .box {
      rx: 6;
      ry: 6;
      fill: #1a2e35;
      stroke: #2a3731;
      stroke-width: 1;
    }
    .pass-box {
      rx: 6;
      ry: 6;
      fill: rgba(98, 254, 181, 0.1);
      stroke: rgba(98, 254, 181, 0.5);
      stroke-width: 1;
    }
  </style>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" class="title">
    Storage-layer requirements
  </text>
  <text x="360" y="45" text-anchor="middle" class="sub">
    the pattern needs three properties from your storage; Tigris ships all three
  </text>

  <!-- Row 1 -->
  <rect x="20" y="65" width="430" height="40" class="box" />
  <text x="35" y="90" class="label">S3-compatible APIs</text>
  <rect x="460" y="65" width="50" height="40" class="pass-box" />
  <text x="485" y="91" text-anchor="middle" class="check">✓</text>
  <text x="525" y="90" class="small">no custom client in tools</text>

  <!-- Row 2 -->
  <rect x="20" y="115" width="430" height="40" class="box" />
  <text x="35" y="140" class="label">Constant-time forking and snapshots</text>
  <rect x="460" y="115" width="50" height="40" class="pass-box" />
  <text x="485" y="141" text-anchor="middle" class="check">✓</text>
  <text x="525" y="140" class="small">10 TB forks as fast as 10 MB</text>

  <!-- Row 3 -->
  <rect x="20" y="165" width="430" height="40" class="box" />
  <text x="35" y="190" class="label">Zero egress between fork and validator</text>
  <rect x="460" y="165" width="50" height="40" class="pass-box" />
  <text x="485" y="191" text-anchor="middle" class="check">✓</text>
  <text x="525" y="190" class="small">free reads of full fork</text>
</svg>
