<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" preserveAspectRatio="xMidYMid meet" style="background: transparent; width: 100%; height: auto; max-width: 100%; display: block">
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title { font-size: 16px; fill: #62feb5; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; font-weight: 600; }
    .small { font-size: 11px; fill: #bac1be; }
    .edge { font-size: 11px; fill: #94a3b8; font-weight: 500; }
    .pass-edge { font-size: 11px; fill: #62feb5; font-weight: 600; }
    .fail-edge { font-size: 11px; fill: #fbbf24; font-weight: 600; }
    .box { rx: 6; ry: 6; fill: #1a2e35; stroke: #2a3731; stroke-width: 1; }
    .fail-box { rx: 6; ry: 6; fill: rgba(251, 191, 36, 0.08); stroke: rgba(251, 191, 36, 0.45); stroke-width: 1; }
    .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    .pass-arrow { stroke: #62feb5; stroke-width: 1.5; fill: none; }
    .fail-arrow { stroke: #fbbf24; stroke-width: 1.5; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowhead-pass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#62feb5" />
    </marker>
    <marker id="arrowhead-fail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" class="title">Soft delete lifecycle</text>
  <text x="410" y="56" text-anchor="middle" class="sub">every delete becomes recoverable for 7–90 days, then is permanently removed</text>

  <!-- Live -->
  <rect x="40" y="170" width="160" height="70" class="box" />
  <text x="120" y="200" text-anchor="middle" class="label">Live</text>
  <text x="120" y="220" text-anchor="middle" class="small">bucket or object</text>

  <!-- Soft-deleted -->
  <rect x="320" y="170" width="180" height="70" class="box" />
  <text x="410" y="200" text-anchor="middle" class="label">Soft-deleted</text>
  <text x="410" y="220" text-anchor="middle" class="small">recoverable</text>

  <!-- Permanently removed -->
  <rect x="620" y="170" width="160" height="70" class="fail-box" />
  <text x="700" y="200" text-anchor="middle" class="label">Permanently</text>
  <text x="700" y="220" text-anchor="middle" class="label">removed</text>

  <!-- delete: Live → Soft-deleted -->
  <path d="M200 205 L318 205" class="arrow" marker-end="url(#arrowhead)" />
  <text x="259" y="195" text-anchor="middle" class="edge">delete</text>

  <!-- restore: Soft-deleted → Live (curved above) -->
  <path d="M360 170 Q260 100 160 170" class="pass-arrow" marker-end="url(#arrowhead-pass)" />
  <text x="260" y="124" text-anchor="middle" class="pass-edge">restore</text>

  <!-- retention expires: Soft-deleted → Permanently removed -->
  <path d="M500 205 L618 205" class="fail-arrow" marker-end="url(#arrowhead-fail)" />
  <text x="559" y="195" text-anchor="middle" class="fail-edge">retention expires</text>

  <!-- Retention annotation under the middle box -->
  <text x="410" y="276" text-anchor="middle" class="small">retention window: 7–90 days, configurable per bucket</text>

  <!-- storage-reclaimed footnote under the right box -->
  <text x="700" y="262" text-anchor="middle" class="small">storage reclaimed</text>
</svg>
