<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 640 330"
  width="640"
  height="330"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 16px;
      fill: #62feb5;
      font-weight: 600;
    }
    .label {
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .small {
      font-size: 11.5px;
      fill: #bac1be;
    }
    .tag {
      font-size: 11px;
      fill: #94a3b8;
    }
    .good {
      fill: #62feb5;
    }
    .bad {
      fill: #f87171;
    }
    .panel {
      rx: 8;
      ry: 8;
      fill: #142229;
      stroke: #2a3731;
      stroke-width: 1;
    }
    .chip {
      rx: 5;
      ry: 5;
      fill: #15242b;
      stroke: #2a3731;
      stroke-width: 1;
    }
    .bubble {
      rx: 6;
      ry: 6;
      fill: #1a2e35;
      stroke: #2a3731;
      stroke-width: 1;
    }
    .bubble-good {
      rx: 6;
      ry: 6;
      fill: #1a2e35;
      stroke: rgba(98, 254, 181, 0.5);
      stroke-width: 1;
    }
    .bubble-bad {
      rx: 6;
      ry: 6;
      fill: #1a2e35;
      stroke: rgba(248, 113, 113, 0.5);
      stroke-width: 1;
    }
  </style>

  <text x="320" y="28" text-anchor="middle" class="title">
    The same prompt edit, two worlds
  </text>

  <!-- LEFT PANEL: fixture -->
  <rect x="20" y="52" width="285" height="262" class="panel" />
  <text x="163" y="76" text-anchor="middle" class="label">
    Your fixture · no history
  </text>

  <rect x="35" y="88" width="255" height="28" class="chip" />
  <text x="163" y="106" text-anchor="middle" class="tag">
    earlier in thread: (empty)
  </text>

  <text x="35" y="144" class="small">user → “suggest a dinner”</text>

  <text x="35" y="168" class="tag">before change</text>
  <rect x="35" y="176" width="255" height="30" class="bubble" />
  <text x="47" y="195" class="small">“Any allergies or preferences?”</text>

  <text x="35" y="228" class="tag">after change</text>
  <rect x="35" y="236" width="255" height="30" class="bubble" />
  <text x="47" y="255" class="small">“Any allergies or preferences?”</text>

  <rect x="35" y="280" width="255" height="28" class="chip" />
  <text x="163" y="298" text-anchor="middle" class="small good">
    identical → tests pass ✓
  </text>

  <!-- RIGHT PANEL: real customer -->
  <rect x="335" y="52" width="285" height="262" class="panel" />
  <text x="478" y="76" text-anchor="middle" class="label">
    A real customer · has history
  </text>

  <rect x="350" y="88" width="255" height="28" class="chip" />
  <text x="478" y="106" text-anchor="middle" class="tag">
    earlier: “vegetarian, severe nut allergy”
  </text>

  <text x="350" y="144" class="small">user → “suggest a dinner”</text>

  <text x="350" y="168" class="tag">before change</text>
  <rect x="350" y="176" width="255" height="30" class="bubble-good" />
  <text x="362" y="195" class="small good">“A vegetarian, nut-free pick: …”</text>

  <text x="350" y="228" class="tag">after change</text>
  <rect x="350" y="236" width="255" height="30" class="bubble-bad" />
  <text x="362" y="255" class="small bad">“Any allergies or preferences?”</text>

  <rect x="350" y="280" width="255" height="28" class="chip" />
  <text x="478" y="298" text-anchor="middle" class="small bad">
    re-asks known facts → regressed ✗
  </text>
</svg>
