<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 680 236"
  width="680"
  height="236"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 16px;
      fill: #62feb5;
      font-weight: 600;
    }
    .head {
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .pool {
      rx: 5;
      ry: 5;
      fill: rgba(248, 113, 113, 0.12);
      stroke: rgba(248, 113, 113, 0.5);
      stroke-width: 1;
    }
    .pooltext {
      font-size: 11px;
      fill: #f1a8a8;
    }
    .db {
      fill: #15242b;
      stroke: #3a4a44;
      stroke-width: 1;
    }
    .flow {
      stroke: #3a4a44;
      stroke-width: 1.3;
      fill: none;
    }
    .flow-green {
      stroke: rgba(98, 254, 181, 0.55);
      stroke-width: 1.3;
      fill: none;
    }
  </style>

  <defs>
    <marker
      id="a1"
      markerWidth="8"
      markerHeight="8"
      refX="5"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L5,3 L0,6 Z" fill="#3a4a44" />
    </marker>
    <marker
      id="a2"
      markerWidth="8"
      markerHeight="8"
      refX="5"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L5,3 L0,6 Z" fill="rgba(98,254,181,0.55)" />
    </marker>

    <!-- robot -->
    <g id="robot">
      <line x1="17" y1="0" x2="17" y2="6" stroke="#3a4a44" stroke-width="1.2" />
      <circle cx="17" cy="2" r="2" fill="#62feb5" />
      <rect
        x="2"
        y="6"
        width="30"
        height="22"
        rx="5"
        ry="5"
        fill="#1a2e35"
        stroke="#2a3731"
        stroke-width="1"
      />
      <circle cx="11" cy="16" r="2.6" fill="#62feb5" />
      <circle cx="23" cy="16" r="2.6" fill="#62feb5" />
      <line x1="11" y1="23" x2="23" y2="23" stroke="#3a4a44" stroke-width="1.2" />
    </g>

    <!-- bucket -->
    <g id="bucket">
      <path
        d="M4,6 A16 13 0 0 1 36,6"
        fill="none"
        stroke="rgba(98,254,181,0.45)"
        stroke-width="1.2"
      />
      <path
        d="M2,6 L8,32 L32,32 L38,6 Z"
        fill="rgba(98,254,181,0.10)"
        stroke="rgba(98,254,181,0.5)"
        stroke-width="1"
      />
      <ellipse
        cx="20"
        cy="6"
        rx="18"
        ry="5"
        fill="#16242a"
        stroke="rgba(98,254,181,0.5)"
        stroke-width="1"
      />
    </g>
  </defs>

  <text x="340" y="28" text-anchor="middle" class="title">
    Scaling a fleet: one database vs a bucket per agent
  </text>

  <line
    x1="340"
    y1="48"
    x2="340"
    y2="224"
    stroke="#2a3731"
    stroke-width="1"
    stroke-dasharray="3 3"
  />

  <!-- ===== LEFT: relational ===== -->
  <text x="170" y="64" text-anchor="middle" class="head">
    Relational checkpointer
  </text>

  <use href="#robot" x="63" y="74" />
  <use href="#robot" x="123" y="74" />
  <use href="#robot" x="183" y="74" />
  <use href="#robot" x="243" y="74" />

  <!-- converge to pool -->
  <path d="M80,104 L162,132" class="flow" marker-end="url(#a1)" />
  <path d="M140,104 L167,132" class="flow" marker-end="url(#a1)" />
  <path d="M200,104 L173,132" class="flow" marker-end="url(#a1)" />
  <path d="M260,104 L178,132" class="flow" marker-end="url(#a1)" />

  <!-- connection pool (bottleneck) -->
  <rect x="100" y="134" width="140" height="24" class="pool" />
  <text x="170" y="150" text-anchor="middle" class="pooltext">
    connection pool
  </text>

  <!-- to DB -->
  <path d="M170,158 L170,176" class="flow" marker-end="url(#a1)" />

  <!-- DB cylinder -->
  <ellipse cx="170" cy="178" rx="46" ry="8" class="db" />
  <rect x="124" y="178" width="92" height="30" class="db" />
  <ellipse cx="170" cy="208" rx="46" ry="8" class="db" />
  <text x="170" y="198" text-anchor="middle" class="head">DB</text>

  <!-- ===== RIGHT: object storage ===== -->
  <text x="510" y="64" text-anchor="middle" class="head">
    Object storage (Tigris)
  </text>

  <use href="#robot" x="408" y="74" />
  <use href="#robot" x="468" y="74" />
  <use href="#robot" x="528" y="74" />
  <use href="#robot" x="588" y="74" />

  <!-- straight to own buckets -->
  <path d="M425,104 L425,172" class="flow-green" marker-end="url(#a2)" />
  <path d="M485,104 L485,172" class="flow-green" marker-end="url(#a2)" />
  <path d="M545,104 L545,172" class="flow-green" marker-end="url(#a2)" />
  <path d="M605,104 L605,172" class="flow-green" marker-end="url(#a2)" />

  <!-- buckets -->
  <use href="#bucket" x="405" y="174" />
  <use href="#bucket" x="465" y="174" />
  <use href="#bucket" x="525" y="174" />
  <use href="#bucket" x="585" y="174" />
</svg>
