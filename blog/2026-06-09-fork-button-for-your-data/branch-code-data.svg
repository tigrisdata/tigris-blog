<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 650 92"
  width="650"
  height="92"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .sub {
      font-size: 12px;
      fill: #94a3b8;
    }
    .mono {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .box {
      rx: 8;
      ry: 8;
      stroke-width: 1.5;
      fill: #142229;
      stroke: #2a3731;
    }
    .accent {
      rx: 8;
      ry: 8;
      stroke-width: 1.5;
      fill: #142229;
      stroke: #62feb5;
      stroke-opacity: 0.5;
    }
    .arrow {
      stroke: #62feb5;
      stroke-width: 1.5;
      fill: none;
    }
  </style>

  <defs>
    <marker
      id="ah-bc"
      markerWidth="7"
      markerHeight="6"
      refX="7"
      refY="3"
      orient="auto"
    >
      <polygon points="0 0, 7 3, 0 6" fill="#62feb5" />
    </marker>
  </defs>

  <rect x="40" y="16" width="225" height="44" class="box" />
  <text x="152" y="42" text-anchor="middle" class="mono">git checkout -b</text>
  <text x="152" y="80" text-anchor="middle" class="sub">branch your code</text>

  <path d="M272,38 L378,38" class="arrow" marker-end="url(#ah-bc)" />

  <rect x="385" y="16" width="225" height="44" class="accent" />
  <text x="497" y="42" text-anchor="middle" class="mono" fill="#62feb5">
    storage.forks.create()
  </text>
  <text x="497" y="80" text-anchor="middle" class="sub" fill="#62feb5">
    branch your data
  </text>
</svg>
