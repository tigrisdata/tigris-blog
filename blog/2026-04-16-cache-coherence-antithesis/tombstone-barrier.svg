<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 760 380"
  width="760"
  height="380"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title { font-size: 16px; fill: #62feb5; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; font-weight: 600; }
    .small { font-size: 12px; fill: #bac1be; }
    .source { rx: 6; ry: 6; fill: #1a2e35; stroke: #2a4050; stroke-width: 1.5; }
    .gate { rx: 6; ry: 6; fill: rgba(98, 254, 181, 0.12); stroke: rgba(98, 254, 181, 0.6); stroke-width: 2; }
    .cache { rx: 6; ry: 6; fill: #1a2e35; stroke: #62feb5; stroke-width: 1.5; }
    .coral { fill: #cf5b5b; }
    .green { fill: #62feb5; }
  </style>

  <text x="380" y="25" text-anchor="middle" class="title">Tombstone barrier</text>
  <text x="380" y="45" text-anchor="middle" class="sub">every cache write passes through a timestamp check, regardless of source</text>

  <!-- Three sources -->
  <rect x="30" y="80" width="180" height="50" class="source" />
  <text x="120" y="100" text-anchor="middle" class="label">Read-through</text>
  <text x="120" y="118" text-anchor="middle" class="small">normal populate on miss</text>

  <rect x="30" y="165" width="180" height="50" class="source" />
  <text x="120" y="185" text-anchor="middle" class="label">Async replication</text>
  <text x="120" y="203" text-anchor="middle" class="small">from a follower region</text>

  <rect x="30" y="250" width="180" height="50" class="source" />
  <text x="120" y="270" text-anchor="middle" class="label">Retry</text>
  <text x="120" y="288" text-anchor="middle" class="small">delayed event delivery</text>

  <!-- Barrier gate -->
  <rect x="300" y="140" width="180" height="120" class="gate" />
  <text x="390" y="170" text-anchor="middle" class="label" fill="#62feb5">Tombstone check</text>
  <text x="390" y="196" text-anchor="middle" class="small">obj.LastModified</text>
  <text x="390" y="214" text-anchor="middle" class="small">&gt; tombstone_ts ?</text>
  <text x="390" y="244" text-anchor="middle" class="small green">yes → write</text>

  <!-- Cache -->
  <rect x="570" y="165" width="160" height="65" class="cache" />
  <text x="650" y="192" text-anchor="middle" class="label">Edge cache</text>
  <text x="650" y="212" text-anchor="middle" class="small">only fresh writes land</text>

  <!-- Rejected -->
  <text x="390" y="300" text-anchor="middle" class="small coral">no → reject (stale)</text>
  <line x1="390" y1="310" x2="390" y2="340" stroke="#cf5b5b" stroke-width="1.5" stroke-dasharray="4 3" />
  <text x="390" y="356" text-anchor="middle" class="small coral">dropped</text>

  <!-- Arrows from sources into gate -->
  <defs>
    <marker id="arrNorm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8" />
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#62feb5" />
    </marker>
  </defs>

  <line x1="210" y1="105" x2="300" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrNorm)" />
  <line x1="210" y1="190" x2="300" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrNorm)" />
  <line x1="210" y1="275" x2="300" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrNorm)" />

  <line x1="480" y1="200" x2="570" y2="197" stroke="#62feb5" stroke-width="1.5" marker-end="url(#arrGreen)" />
</svg>
