<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 380"
  width="720"
  height="380"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title { font-size: 16px; fill: #62feb5; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 14px; fill: #e2e8f0; font-weight: 600; }
    .small { font-size: 12px; fill: #bac1be; }
    .layer-write { rx: 6; ry: 6; fill: rgba(98, 254, 181, 0.10); stroke: rgba(98, 254, 181, 0.5); stroke-width: 1.5; }
    .layer-read { rx: 6; ry: 6; fill: rgba(91, 164, 207, 0.10); stroke: rgba(91, 164, 207, 0.5); stroke-width: 1.5; }
    .layer-repl { rx: 6; ry: 6; fill: rgba(207, 142, 91, 0.10); stroke: rgba(207, 142, 91, 0.5); stroke-width: 1.5; }
    .green { fill: #62feb5; }
    .blue { fill: #5ba4cf; }
    .sand { fill: #cf8e5b; }
  </style>

  <text x="360" y="25" text-anchor="middle" class="title">Three-layer defense</text>
  <text x="360" y="45" text-anchor="middle" class="sub">each layer catches what the one above misses</text>

  <!-- Write path -->
  <rect x="160" y="75" width="450" height="70" class="layer-write" />
  <text x="385" y="100" text-anchor="middle" class="label green">Write path — eager invalidation</text>
  <text x="385" y="122" text-anchor="middle" class="small">close the gap before the mutation commits</text>

  <!-- Read path -->
  <rect x="160" y="165" width="450" height="70" class="layer-read" />
  <text x="385" y="190" text-anchor="middle" class="label blue">Read path — tombstone barriers</text>
  <text x="385" y="212" text-anchor="middle" class="small">block stale re-population on every cache write</text>

  <!-- Replication boundary -->
  <rect x="160" y="255" width="450" height="70" class="layer-repl" />
  <text x="385" y="280" text-anchor="middle" class="label sand">Replication boundary — timestamp ordering</text>
  <text x="385" y="302" text-anchor="middle" class="small">newer data always wins, regardless of arrival order</text>

  <!-- Failure modes arrow on left -->
  <defs>
    <marker id="arrUp" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#94a3b8" />
    </marker>
  </defs>
  <line x1="100" y1="310" x2="100" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrUp)" />
  <text x="85" y="210" text-anchor="middle" class="small" transform="rotate(-90, 85, 210)">failure modes caught upward</text>

  <!-- Footer note -->
  <text x="360" y="360" text-anchor="middle" class="small">CI tested each layer individually. Antithesis tested the gaps between them.</text>
</svg>
