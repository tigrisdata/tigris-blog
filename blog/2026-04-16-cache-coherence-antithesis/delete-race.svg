<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 400"
  width="720"
  height="400"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title { font-size: 16px; fill: #62feb5; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; font-weight: 600; }
    .small { font-size: 12px; fill: #bac1be; }
    .step { rx: 4; ry: 4; fill: #1a2e35; stroke: #2a4050; stroke-width: 1; }
    .danger { rx: 4; ry: 4; fill: rgba(207, 91, 91, 0.12); stroke: rgba(207, 91, 91, 0.5); stroke-width: 1.5; }
    .coral { fill: #cf5b5b; }
  </style>

  <text x="360" y="25" text-anchor="middle" class="title">The delete-then-read race</text>
  <text x="360" y="45" text-anchor="middle" class="sub">a concurrent GET arrives between FDB delete and the deferred cache eviction</text>

  <!-- Timeline A -->
  <text x="20" y="90" class="label">Request A: DELETE</text>
  <line x1="20" y1="100" x2="700" y2="100" stroke="#2a4050" stroke-width="1" />

  <rect x="30" y="110" width="110" height="32" class="step" />
  <text x="85" y="131" text-anchor="middle" class="small">acquire lock</text>

  <rect x="160" y="110" width="130" height="32" class="step" />
  <text x="225" y="131" text-anchor="middle" class="small">FDB delete ok</text>

  <rect x="440" y="110" width="160" height="32" class="step" />
  <text x="520" y="131" text-anchor="middle" class="small">deferred: evict cache</text>

  <rect x="610" y="110" width="80" height="32" class="step" />
  <text x="650" y="131" text-anchor="middle" class="small">unlock</text>

  <!-- Race window -->
  <rect x="290" y="80" width="150" height="140" class="danger" />
  <text x="365" y="75" text-anchor="middle" class="small coral" font-weight="600">race window</text>
  <text x="365" y="235" text-anchor="middle" class="small coral">object is gone in FDB,</text>
  <text x="365" y="250" text-anchor="middle" class="small coral">still present in cache</text>

  <!-- Timeline B -->
  <text x="20" y="290" class="label">Request B: GET (concurrent)</text>
  <line x1="20" y1="300" x2="700" y2="300" stroke="#2a4050" stroke-width="1" />

  <rect x="310" y="310" width="110" height="32" class="step" />
  <text x="365" y="331" text-anchor="middle" class="small">hit edge cache</text>

  <!-- Arrow showing B hits during race window -->
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cf5b5b" />
    </marker>
  </defs>
  <line x1="365" y1="220" x2="365" y2="310" stroke="#cf5b5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2)" />

  <!-- Outcome -->
  <rect x="305" y="360" width="120" height="30" class="danger" />
  <text x="365" y="380" text-anchor="middle" class="small coral" font-weight="600">
    200 + deleted body
  </text>
</svg>
