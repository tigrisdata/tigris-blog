<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 780 440"
  width="780"
  height="440"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title { font-size: 16px; fill: #62feb5; font-weight: 600; }
    .sub { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; font-weight: 600; }
    .small { font-size: 12px; fill: #bac1be; }
    .step { rx: 4; ry: 4; fill: #1a2e35; stroke: #2a4050; stroke-width: 1; }
    .windowFill { fill: rgba(207, 91, 91, 0.08); stroke: rgba(207, 91, 91, 0.55); stroke-width: 1.5; stroke-dasharray: 5 4; }
    .result { rx: 4; ry: 4; fill: rgba(207, 91, 91, 0.10); stroke: rgba(207, 91, 91, 0.55); stroke-width: 1.5; }
    .coral { fill: #cf5b5b; }
  </style>

  <defs>
    <marker id="arrCoral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cf5b5b" />
    </marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" class="title">The delete-then-read race</text>
  <text x="390" y="46" text-anchor="middle" class="sub">a concurrent GET arrives in the gap between FDB delete and the deferred cache eviction</text>

  <!-- Race window region: covers the full vertical span behind both timelines -->
  <rect x="290" y="70" width="160" height="320" class="windowFill" />
  <text x="370" y="88" text-anchor="middle" class="small coral" font-weight="600">race window</text>

  <!-- Request A label + axis -->
  <text x="20" y="130" class="label">Request A: DELETE</text>
  <line x1="20" y1="145" x2="760" y2="145" stroke="#2a4050" stroke-width="1" />

  <!-- 5 steps for Request A. Steps 1 and 2 fit left of race window; steps 3, 4, 5 are to the right. -->
  <rect x="30" y="158" width="110" height="34" class="step" />
  <text x="85" y="180" text-anchor="middle" class="small">1. acquire lock</text>

  <rect x="150" y="158" width="130" height="34" class="step" />
  <text x="215" y="180" text-anchor="middle" class="small">2. FDB delete ok</text>

  <!-- race window gap sits here, no boxes -->

  <rect x="460" y="158" width="150" height="34" class="step" />
  <text x="535" y="180" text-anchor="middle" class="small">3. deferred evict</text>

  <rect x="620" y="158" width="140" height="34" class="step" />
  <text x="690" y="180" text-anchor="middle" class="small">4. unlock</text>

  <!-- Annotation inside race window about state divergence -->
  <text x="370" y="218" text-anchor="middle" class="small coral">object gone in FDB,</text>
  <text x="370" y="234" text-anchor="middle" class="small coral">still present in cache</text>

  <!-- Request B label + axis -->
  <text x="20" y="290" class="label">Request B: GET (concurrent)</text>
  <line x1="20" y1="305" x2="760" y2="305" stroke="#2a4050" stroke-width="1" />

  <!-- Request B arrives during race window -->
  <rect x="315" y="318" width="110" height="34" class="step" />
  <text x="370" y="340" text-anchor="middle" class="small">hits edge cache</text>

  <!-- Vertical arrow from race window annotation down into GET box -->
  <line x1="370" y1="250" x2="370" y2="316" stroke="#cf5b5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrCoral)" />

  <!-- Outcome -->
  <rect x="315" y="368" width="110" height="28" class="result" />
  <text x="370" y="386" text-anchor="middle" class="small coral" font-weight="600">200 + deleted body</text>

  <!-- Legend at the very bottom -->
  <text x="390" y="420" text-anchor="middle" class="small">step 2 completes, step 3 hasn't run yet — concurrent GET serves the deleted object</text>
</svg>
