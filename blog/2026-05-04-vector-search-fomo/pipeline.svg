<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" role="img" aria-label="Pipeline. A nightly cron starts Claude Code, which writes new pages into a versioned scratch area in the bucket. Lint then verifies the scratch. On a critical lint failure the scratch is left to be garbage-collected and the live wiki is unchanged. On clean lint, the scratch is server-side renamed into the live wiki and a presigned digest URL is posted to Slack.">
  <style>
    .label { fill: #c8cfd6; font-family: ui-monospace, "JetBrains Mono", "Berkeley Mono", monospace; font-size: 13px; }
    .sublabel { fill: #6b7480; font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 11px; }
    .branch-ok { fill: #3ddc97; font-family: ui-monospace, monospace; font-size: 11px; font-weight: 600; }
    .branch-bad { fill: #e57373; font-family: ui-monospace, monospace; font-size: 11px; font-weight: 600; }
    .scratch-tag { fill: #6b7480; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.5px; }
  </style>
  <rect width="600" height="520" fill="#0a0c0e"/>

  <!-- Step 1: Cron -->
  <rect x="200" y="20" width="200" height="58" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="300" y="44" text-anchor="middle">cron fires</text>
  <text class="sublabel" x="300" y="62" text-anchor="middle">07:00 UTC, every day</text>

  <line x1="300" y1="78" x2="300" y2="108" stroke="#6b7480" stroke-width="1.5"/>
  <polygon points="295,108 300,116 305,108" fill="#6b7480"/>

  <!-- Step 2: Claude Code writes to scratch -->
  <rect x="160" y="118" width="280" height="78" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="300" y="142" text-anchor="middle">Claude Code writes the wiki</text>
  <text class="sublabel" x="300" y="160" text-anchor="middle">into a fresh scratch area in the bucket</text>
  <text class="scratch-tag" x="300" y="180" text-anchor="middle">staging/&lt;runId&gt;/</text>

  <line x1="300" y1="196" x2="300" y2="226" stroke="#6b7480" stroke-width="1.5"/>
  <polygon points="295,226 300,234 305,226" fill="#6b7480"/>

  <!-- Step 3: Lint -->
  <rect x="200" y="236" width="200" height="58" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="300" y="260" text-anchor="middle">lint the scratch</text>
  <text class="sublabel" x="300" y="278" text-anchor="middle">does it pass the schema?</text>

  <!-- Branch: critical (left) -->
  <path d="M 200 265 L 100 265 L 100 320" fill="none" stroke="#e57373" stroke-width="1.5"/>
  <polygon points="95,320 100,328 105,320" fill="#e57373"/>
  <text class="branch-bad" x="150" y="258" text-anchor="middle">no</text>

  <rect x="20" y="330" width="160" height="78" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="100" y="354" text-anchor="middle">drop scratch</text>
  <text class="sublabel" x="100" y="372" text-anchor="middle">live wiki unchanged</text>
  <text class="sublabel" x="100" y="390" text-anchor="middle">notify the human</text>

  <!-- Branch: clean (right/down) -->
  <path d="M 400 265 L 500 265 L 500 320" fill="none" stroke="#3ddc97" stroke-width="1.5"/>
  <polygon points="495,320 500,328 505,320" fill="#3ddc97"/>
  <text class="branch-ok" x="450" y="258" text-anchor="middle">yes</text>

  <rect x="420" y="330" width="160" height="78" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="500" y="354" text-anchor="middle">promote to live</text>
  <text class="sublabel" x="500" y="372" text-anchor="middle">server-side rename</text>
  <text class="scratch-tag" x="500" y="390" text-anchor="middle">staging/&lt;runId&gt;/ → wiki/</text>

  <!-- Down arrow from promote to slack -->
  <line x1="500" y1="408" x2="500" y2="438" stroke="#3ddc97" stroke-width="1.5"/>
  <polygon points="495,438 500,446 505,438" fill="#3ddc97"/>

  <!-- Final: Slack -->
  <rect x="420" y="448" width="160" height="58" rx="6" fill="#13171a" stroke="#2a3038" stroke-width="1"/>
  <text class="label" x="500" y="472" text-anchor="middle">presigned URL</text>
  <text class="sublabel" x="500" y="490" text-anchor="middle">posted to Slack</text>
</svg>
