<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560" role="img" aria-label="Three-step diagram showing how a write makes it (or doesn't) to the Tigris bucket. Step 1: the agent runs the Anthropic SDK loop in-process and calls writeFile, readFile, and listDir. Step 2: agent-shell holds those writes in an in-memory buffer, shown as four wiki page icons. Step 3 has two branches. On a clean run, flush() promotes the entire buffer to the Tigris bucket atomically. On a thrown error, discard() drops the buffer and the bucket stays byte-for-byte unchanged.">
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      fill: #e2e8f0;
    }
    .sublabel {
      font-size: 13px;
      font-weight: 500;
      fill: #94a3b8;
    }
    .codelabel {
      font-family: ui-monospace, "JetBrains Mono", "Berkeley Mono", monospace;
      font-size: 12px;
      fill: #a7f3d0;
    }
    .arrow-label {
      font-size: 12px;
      font-weight: 600;
      fill: #94a3b8;
    }
    .branch-good {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      font-weight: 700;
      fill: #62feb5;
    }
    .branch-bad {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      font-weight: 700;
      fill: #e57373;
    }
    .filename {
      font-family: ui-monospace, monospace;
      font-size: 10px;
      fill: #94a3b8;
    }
    .badge-text {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      font-weight: 700;
      fill: #0a0c0e;
    }
    .badge-text-bad {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      fill: #2a0a0a;
    }
  </style>
  <defs>
    <marker id="head-good" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#62feb5" />
    </marker>
    <marker id="head-bad" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#e57373" />
    </marker>
    <marker id="head-default" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Step 1: The Agent -->
  <rect x="200" y="20" width="320" height="100" rx="12" ry="12" fill="#142229" stroke="#334155" stroke-width="2" />
  <circle cx="222" cy="42" r="14" fill="#62feb5" />
  <text class="badge-text" x="222" y="46" text-anchor="middle">1</text>
  <text class="title" x="360" y="48" text-anchor="middle">The Agent</text>
  <text class="sublabel" x="360" y="72" text-anchor="middle">Anthropic SDK loop, runs in your Node process</text>
  <text class="codelabel" x="360" y="98" text-anchor="middle">writeFile()  ·  readFile()  ·  listDir()</text>

  <!-- Arrow 1 to 2 -->
  <line x1="360" y1="120" x2="360" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#head-default)" />
  <text class="arrow-label" x="370" y="145">tool calls</text>

  <!-- Step 2: agent-shell with buffered pages -->
  <rect x="100" y="170" width="520" height="200" rx="12" ry="12" fill="#142229" stroke="#62feb5" stroke-width="2.5" />
  <circle cx="122" cy="192" r="14" fill="#62feb5" />
  <text class="badge-text" x="122" y="196" text-anchor="middle">2</text>
  <text class="title" x="360" y="198" text-anchor="middle" fill="#ecfdf5">agent-shell</text>
  <text class="sublabel" x="360" y="222" text-anchor="middle" fill="#a7f3d0">in-memory buffer — every write stages here, not in the bucket yet</text>

  <!-- Page 1 -->
  <g transform="translate(180, 250)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#1e2c33" stroke="#94a3b8" stroke-width="1" />
    <line x1="6" y1="14" x2="44" y2="14" stroke="#64748b" />
    <line x1="6" y1="22" x2="44" y2="22" stroke="#64748b" />
    <line x1="6" y1="30" x2="44" y2="30" stroke="#64748b" />
    <line x1="6" y1="38" x2="36" y2="38" stroke="#64748b" />
    <text class="filename" x="25" y="78" text-anchor="middle">wiki/binq.md</text>
  </g>
  <!-- Page 2 -->
  <g transform="translate(255, 250)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#1e2c33" stroke="#94a3b8" stroke-width="1" />
    <line x1="6" y1="14" x2="44" y2="14" stroke="#64748b" />
    <line x1="6" y1="22" x2="44" y2="22" stroke="#64748b" />
    <line x1="6" y1="30" x2="40" y2="30" stroke="#64748b" />
    <text class="filename" x="25" y="78" text-anchor="middle">wiki/hnsw.md</text>
  </g>
  <!-- Page 3 -->
  <g transform="translate(330, 250)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#1e2c33" stroke="#94a3b8" stroke-width="1" />
    <line x1="6" y1="14" x2="44" y2="14" stroke="#64748b" />
    <line x1="6" y1="22" x2="44" y2="22" stroke="#64748b" />
    <line x1="6" y1="30" x2="44" y2="30" stroke="#64748b" />
    <line x1="6" y1="38" x2="32" y2="38" stroke="#64748b" />
    <text class="filename" x="25" y="78" text-anchor="middle">sources/…</text>
  </g>
  <!-- Page 4 -->
  <g transform="translate(405, 250)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#1e2c33" stroke="#94a3b8" stroke-width="1" />
    <line x1="6" y1="14" x2="44" y2="14" stroke="#64748b" />
    <line x1="6" y1="22" x2="44" y2="22" stroke="#64748b" />
    <text class="filename" x="25" y="78" text-anchor="middle">digest.md</text>
  </g>

  <!-- Branch left: throw → discard (dashed red) -->
  <line x1="260" y1="370" x2="200" y2="430" stroke="#e57373" stroke-width="2.5" stroke-dasharray="6 4" fill="none" stroke-linecap="round" marker-end="url(#head-bad)" />
  <text class="branch-bad" x="170" y="395" text-anchor="end">on throw</text>
  <text class="branch-bad" x="170" y="412" text-anchor="end">discard()</text>

  <!-- Branch right: clean → flush (solid green) -->
  <line x1="460" y1="370" x2="520" y2="430" stroke="#62feb5" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#head-good)" />
  <text class="branch-good" x="550" y="395" text-anchor="start">on clean run</text>
  <text class="branch-good" x="550" y="412" text-anchor="start">flush()</text>

  <!-- Step 3a: buffer dropped (red) -->
  <rect x="100" y="440" width="200" height="100" rx="12" ry="12" fill="#1f1416" stroke="#e57373" stroke-width="2" />
  <circle cx="122" cy="462" r="14" fill="#e57373" />
  <text class="badge-text-bad" x="122" y="466" text-anchor="middle">3a</text>
  <text class="title" x="200" y="472" text-anchor="middle" fill="#fda4a4">buffer dropped</text>
  <text class="sublabel" x="200" y="496" text-anchor="middle" fill="#fcb6b6">the live bucket stays</text>
  <text class="sublabel" x="200" y="514" text-anchor="middle" fill="#fcb6b6">byte-for-byte unchanged</text>

  <!-- Step 3b: Tigris bucket (green) -->
  <rect x="420" y="440" width="200" height="100" rx="12" ry="12" fill="#142229" stroke="#62feb5" stroke-width="2.5" />
  <rect x="436" y="452" width="168" height="3" rx="1.5" ry="1.5" fill="#62feb5" fill-opacity="0.35" stroke="none" />
  <circle cx="442" cy="462" r="14" fill="#62feb5" />
  <text class="badge-text" x="442" y="466" text-anchor="middle">3b</text>
  <text class="title" x="520" y="472" text-anchor="middle" fill="#62feb5">Tigris bucket</text>
  <text class="codelabel" x="520" y="496" text-anchor="middle">wiki/  ·  sources/  ·  state.json</text>
  <text class="sublabel" x="520" y="516" text-anchor="middle">atomic promote, all or nothing</text>
</svg>
