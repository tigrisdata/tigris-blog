<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 200"
  width="720"
  height="200"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 18px;
      fill: #62feb5;
      font-weight: 600;
    }
    .caption {
      font-size: 14px;
      fill: #94a3b8;
    }
    .label {
      font-size: 15px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .small {
      font-size: 12px;
      fill: #bac1be;
    }
    .box {
      rx: 8;
      ry: 8;
      fill: #142229;
      stroke: #2a3731;
      stroke-width: 1.5;
    }
    .accent {
      rx: 8;
      ry: 8;
      fill: rgba(98, 254, 181, 0.1);
      stroke: rgba(98, 254, 181, 0.5);
      stroke-width: 1.5;
    }
    .arrow {
      stroke: #62feb5;
      stroke-width: 1.5;
      fill: none;
    }
  </style>

  <defs>
    <marker
      id="ah-life"
      markerWidth="7"
      markerHeight="6"
      refX="7"
      refY="3"
      orient="auto"
    >
      <polygon points="0 0, 7 3, 0 6" fill="#62feb5" />
    </marker>
  </defs>

  <text x="360" y="26" text-anchor="middle" class="title">
    Four function calls, start to finish
  </text>

  <rect x="20" y="80" width="148" height="64" class="accent" />
  <text x="94" y="108" text-anchor="middle" class="label" fill="#62feb5">
    createWorkspace
  </text>
  <text x="94" y="128" text-anchor="middle" class="small">
    provision bucket and key
  </text>

  <path d="M168 112 L220 112" class="arrow" marker-end="url(#ah-life)" />

  <rect x="220" y="80" width="128" height="64" class="box" />
  <text x="284" y="108" text-anchor="middle" class="label">checkpoint</text>
  <text x="284" y="128" text-anchor="middle" class="small">
    snapshot before risk
  </text>

  <path d="M348 112 L400 112" class="arrow" marker-end="url(#ah-life)" />

  <rect x="400" y="80" width="128" height="64" class="box" />
  <text x="464" y="108" text-anchor="middle" class="label">your agent</text>
  <text x="464" y="128" text-anchor="middle" class="small">
    writes to workspace
  </text>

  <path d="M528 112 L580 112" class="arrow" marker-end="url(#ah-life)" />

  <rect x="580" y="80" width="120" height="64" class="accent" />
  <text x="640" y="108" text-anchor="middle" class="label" fill="#62feb5">
    teardown
  </text>
  <text x="640" y="128" text-anchor="middle" class="small">
    revoke key, drop bucket
  </text>

  <text x="360" y="184" text-anchor="middle" class="caption">
    the last call runs even when the agent crashes, which is the whole point
  </text>
</svg>
