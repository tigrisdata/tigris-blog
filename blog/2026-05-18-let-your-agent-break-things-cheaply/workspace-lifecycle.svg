<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 700 220"
  width="700"
  height="220"
  style="background: transparent"
>
  <style>
    text {
      font-family: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI",
        Helvetica, Arial, sans-serif;
    }
    .title {
      font-size: 16px;
      fill: #62feb5;
      font-weight: 600;
    }
    .sub {
      font-size: 12px;
      fill: #94a3b8;
    }
    .label {
      font-size: 12px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .small {
      font-size: 10px;
      fill: #bac1be;
    }
    .mono {
      font-size: 10px;
      fill: #62feb5;
      font-family: "Fira Code VF", ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, monospace;
    }
    .edge {
      font-size: 10px;
      fill: #94a3b8;
    }
    .box {
      rx: 8;
      ry: 8;
      fill: #142229;
      stroke: #2a3731;
      stroke-width: 1.5;
    }
    .accent {
      rx: 8;
      ry: 8;
      fill: rgba(98, 254, 181, 0.1);
      stroke: rgba(98, 254, 181, 0.5);
      stroke-width: 1.5;
    }
    .arrow {
      stroke: #62feb5;
      stroke-width: 1.5;
      fill: none;
    }
  </style>

  <defs>
    <marker
      id="ah-life"
      markerWidth="7"
      markerHeight="6"
      refX="7"
      refY="3"
      orient="auto"
    >
      <polygon points="0 0, 7 3, 0 6" fill="#62feb5" />
    </marker>
  </defs>

  <text x="350" y="26" text-anchor="middle" class="title">
    Controlled run with rollback
  </text>
  <text x="350" y="46" text-anchor="middle" class="sub">
    provision, snapshot, run, teardown  the finally block is non-negotiable
  </text>

  <rect x="12" y="88" width="130" height="64" class="accent" />
  <text x="77" y="112" text-anchor="middle" class="label" fill="#62feb5">
    createWorkspace
  </text>
  <text x="77" y="128" text-anchor="middle" class="small">TTL + scoped key</text>

  <path d="M142 120 L168 120" class="arrow" marker-end="url(#ah-life)" />

  <rect x="168" y="88" width="118" height="64" class="box" />
  <text x="227" y="112" text-anchor="middle" class="label">checkpoint</text>
  <text x="227" y="128" text-anchor="middle" class="small">pre-risk snapshot</text>

  <path d="M286 120 L312 120" class="arrow" marker-end="url(#ah-life)" />
  <text x="299" y="112" text-anchor="middle" class="edge">try</text>

  <rect x="312" y="88" width="118" height="64" class="box" />
  <text x="371" y="112" text-anchor="middle" class="label">runAgent</text>
  <text x="371" y="128" text-anchor="middle" class="small">writes to workspace</text>

  <path d="M430 120 L456 120" class="arrow" marker-end="url(#ah-life)" />
  <text x="443" y="112" text-anchor="middle" class="edge">finally</text>

  <rect x="456" y="88" width="150" height="64" class="accent" />
  <text x="531" y="112" text-anchor="middle" class="label" fill="#62feb5">
    teardownWorkspace
  </text>
  <text x="531" y="128" text-anchor="middle" class="small">revoke + delete</text>

  <path d="M606 120 L632 120" class="arrow" marker-end="url(#ah-life)" />

  <rect x="632" y="100" width="56" height="40" class="box" />
  <text x="660" y="126" text-anchor="middle" class="label">done</text>

  <text x="350" y="188" text-anchor="middle" class="sub">
    if the agent crashes, the coordinator still runs cleanup or containment falls apart
  </text>
</svg>
